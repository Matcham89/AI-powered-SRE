# SOPS configuration — Age public key routing
#
# Replace AGE_PUBLIC_KEY_PLACEHOLDER with your Age public key.
# To generate a new Age key pair:
#   age-keygen -o ~/.config/sops/age/keys.txt
#   # The public key is printed to stdout and is the first line of keys.txt
#   # e.g. age1ql3z7hjy54pw3hyww5ayyfg7zqgvc7w3j2elw8zmrj2kg5sfn9aqmcac8p
#
# The public key is safe to commit. The private key (keys.txt) must NEVER be committed.
# The private key is added to the cluster once by bootstrap/install.sh.

creation_rules:
  # ArgoCD repo + cluster credentials
  - path_regex: cluster/registry/.*\.yaml$
    age: >-
      age1jpjljdr54z2929pj587e2tl64cvfz67dugx4df0t93y96fnqx4uq7e8qvg

  # ArgoCD self-management secrets (admin password)
  - path_regex: cluster/argocd/.*\.enc\.yaml$
    age: >-
      age1jpjljdr54z2929pj587e2tl64cvfz67dugx4df0t93y96fnqx4uq7e8qvg

  # Platform component secrets (auth, storage, observability)
  - path_regex: platform/.*\.enc\.yaml$
    age: >-
      age1jpjljdr54z2929pj587e2tl64cvfz67dugx4df0t93y96fnqx4uq7e8qvg

  # Agent secrets (Anthropic API key, GitHub PAT reference)
  - path_regex: agents/.*\.enc\.yaml$
    age: >-
      age1jpjljdr54z2929pj587e2tl64cvfz67dugx4df0t93y96fnqx4uq7e8qvg

  # Application workload secrets
  - path_regex: apps/.*\.enc\.yaml$
    age: >-
      age1jpjljdr54z2929pj587e2tl64cvfz67dugx4df0t93y96fnqx4uq7e8qvg
