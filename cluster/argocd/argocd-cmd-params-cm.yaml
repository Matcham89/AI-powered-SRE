apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Run argocd-server in insecure (plain HTTP) mode.
  # TLS termination is handled by Envoy Gateway at the edge — the server
  # does not need to handle TLS itself and must not redirect HTTP → HTTPS.
  server.insecure: "true"
