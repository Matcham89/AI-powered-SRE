apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Default policy for unauthenticated or ungrouped users
  policy.default: role:readonly

  policy.csv: |
    # ── Admin role ──────────────────────────────────────────────────────────────
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters,     get, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, logs,         get, *, allow
    p, role:admin, exec,         create, */*, allow
    p, role:admin, projects,     *, *, allow

    # ── Authentik OIDC group binding ─────────────────────────────────────────────
    # Populated from Authentik group claim; update group name to match your setup
    # Configured in Step 8 once Authentik is deployed
    g, argocd-admins, role:admin

  # Request the groups claim from the OIDC provider
  scopes: '[groups, email]'
