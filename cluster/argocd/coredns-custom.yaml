apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # k3s CoreDNS imports *.server files — *.override is silently ignored
  platform-hosts.server: |
    rewrite name regex ^(auth|argocd|grafana|temporal)\.local\.$ platform-gateway.envoy-gateway-system.svc.cluster.local.
    fallthrough
