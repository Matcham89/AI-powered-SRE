apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Imported INSIDE the .:53 {} server block by k3s CoreDNS (via *.override).
  # *.server files are imported at the global level and must be complete server
  # blocks — bare directives there create empty zone servers, so we only use
  # *.override here.
  #
  # Rewrites *.demo browser-facing hostnames to stable in-cluster FQDNs so
  # no hardcoded ClusterIPs are needed — safe to rebuild without changes.
  #
  # auth.demo → authentik-internal (port 32170→9000) so DEX can reach
  # Authentik using the same URL the browser uses.
  # argocd.demo → argocd-internal (port 32170→8080) so argocd-server can
  # verify JWTs by fetching its own OIDC discovery doc.
  # grafana/temporal.demo → platform-gateway (Envoy, port 80).
  platform-hosts.override: |
    rewrite name exact auth.demo authentik-internal.authentik.svc.cluster.local
    rewrite name exact argocd.demo argocd-internal.argocd.svc.cluster.local
    rewrite name exact grafana.demo platform-gateway.envoy-gateway-system.svc.cluster.local
    rewrite name exact temporal.demo platform-gateway.envoy-gateway-system.svc.cluster.local
