apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Imported INSIDE the .:53 {} server block by k3s CoreDNS (via *.override).
  # *.server files are imported at the global level and must be complete server
  # blocks — bare directives there create empty zone servers, so we only use
  # *.override here.
  #
  # auth.local → authentik-internal ClusterIP (port 32170→9000) so DEX can
  # reach Authentik using the same URL the browser uses.
  # argocd/grafana/temporal.local → platform-gateway ClusterIP (Envoy, port 80).
  platform-hosts.override: |
    template IN A local {
      match "^auth\.local\.$"
      answer "{{ .Name }} 60 IN A 10.43.50.96"
      fallthrough
    }
    template IN A local {
      match "^argocd\.local\.$"
      answer "{{ .Name }} 60 IN A 10.43.152.225"
      fallthrough
    }
    template IN A local {
      match "^(grafana|temporal)\.local\.$"
      answer "{{ .Name }} 60 IN A 10.43.66.2"
      fallthrough
    }
