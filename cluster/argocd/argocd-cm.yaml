apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Use annotation-based tracking — avoids label conflicts with Helm-managed resources
  application.resourceTrackingMethod: annotation

  url: http://argocd.demo:32170

  dex.config: |
    connectors:
    - config:
        issuer: http://auth.demo:32170/application/o/argocd/
        clientID: argocd
        # Reference the separate argocd-oidc-secret (created by the
        # argocd-oidc SopsSecret) rather than the default argocd-secret.
        # Syntax: $<secretName>:<key> — without the colon form, ArgoCD
        # looks the key up in argocd-secret, which doesn't have it and
        # dex-server fails to initialise the connector.
        clientSecret: $argocd-oidc-secret:client-secret
        insecureEnableGroups: true
        scopes:
          - openid
          - profile
          - email
      name: authentik
      type: oidc
      id: authentik

  # Allow health checks on Gateway API resources (added in Step 7)
  resource.customizations.health.gateway.networking.k8s.io_HTTPRoute: |
    hs = {}
    hs.status = "Progressing"
    hs.message = "Waiting for HTTPRoute to be accepted by gateway"
    if obj.status ~= nil and obj.status.parents ~= nil then
      for _, parent in ipairs(obj.status.parents) do
        for _, condition in ipairs(parent.conditions or {}) do
          if condition.type == "Accepted" and condition.status == "True" then
            hs.status = "Healthy"
            hs.message = "HTTPRoute accepted by " .. (parent.parentRef and parent.parentRef.name or "gateway")
            return hs
          end
        end
      end
    end
    return hs
