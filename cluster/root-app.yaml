apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Matcham89/AI-powered-SRE
    targetRevision: HEAD
    path: cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # HTTPRoute CRD is installed by the envoy-gateway child app — root's
      # own HTTPRoute (argocd) would otherwise fail dry-run and abort the
      # entire sync, preventing the child apps (including envoy-gateway)
      # from ever being created. Skip dry-run for missing CRDs so the sync
      # proceeds; selfHeal retries the HTTPRoute once the CRD appears.
      - SkipDryRunOnMissingResource=true
