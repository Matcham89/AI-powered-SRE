apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources are added here as each platform step completes.
# This staged approach keeps ArgoCD's dashboard clean — no apps
# appear until their backing manifests are ready.

resources:
  # ── Encrypted credentials (SopsSecret CRDs) ───────────────────────────────────
  # Decrypted by SOPS Secrets Operator → native K8s Secrets consumed by ArgoCD
  - registry/repo-credentials.enc.yaml
  - registry/cluster-local.enc.yaml

  # ── ArgoCD self-management ────────────────────────────────────────────────────
  - argocd/argocd-cm.yaml
  - argocd/argocd-cmd-params-cm.yaml
  - argocd/argocd-rbac-cm.yaml
  - argocd/httproute-argocd.yaml
  - argocd/coredns-custom.yaml
  - argocd/argocd-oidc-secret.enc.yaml
  - networking/platform-gateway-svc.yaml
  - networking/authentik-internal-svc.yaml
  - networking/argocd-internal-svc.yaml

  # ── Platform component Applications ───────────────────────────────────────────
  # Uncommented as each step is implemented and tested:
  - apps/sops-operator-app.yaml        # Step 6  — SOPS Secrets Operator
  - apps/gateway-app.yaml              # Step 7  — Envoy Gateway (controller)
  - apps/gateway-resources-app.yaml   # Step 7  — Gateway instance + EnvoyProxy
  - apps/cert-manager-app.yaml        # Step 7  — cert-manager (TLS)
  - apps/security-app.yaml            # Step 7  — NetworkPolicies

  - apps/authentik-app.yaml            # Step 8  — Authentik (OIDC/SSO)
  - apps/authentik-routes-app.yaml    # Step 8  — Authentik HTTPRoutes
  - apps/seaweedfs-app.yaml            # Step 9  — SeaweedFS (Object Storage)
  - apps/loki-app.yaml                 # Step 10 — Grafana Loki
  - apps/tempo-app.yaml               # Step 10 — Grafana Tempo
  - apps/mimir-app.yaml               # Step 10 — Grafana Mimir
  - apps/alloy-app.yaml               # Step 10 — Grafana Alloy
  - apps/metrics-server-app.yaml      # Step 10 — metrics-server (hostNetwork, port 4443)
  - apps/kube-state-metrics-app.yaml  # Step 10 — kube-state-metrics
  - apps/node-exporter-app.yaml      # Step 10 — node-exporter (host metrics)
  - apps/beyla-app.yaml               # Step 10 — Grafana Beyla (eBPF)
  - apps/grafana-app.yaml             # Step 10 — Grafana
  - apps/kagent-crds-app.yaml           # Step 11 — kagent CRDs (must sync before kagent)
  - apps/kagent-app.yaml               # Step 11 — kagent (AI SRE)
  - apps/khook-crds-app.yaml          # Step 11 — khook CRDs (must sync before khook)
  - apps/khook-app.yaml               # Step 11 — khook (K8s event watcher)
  - apps/github-mcp-app.yaml          # Step 11 — GitHub MCP agent
  - apps/cnpg-app.yaml                 # Step 12 — CloudNative-PG operator (prereq)
  - apps/temporal-app.yaml             # Step 12 — Temporal workflow engine
  - apps/sample-api-app.yaml          # Step 12 — Sample Go API
