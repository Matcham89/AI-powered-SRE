apiVersion: v1
kind: Service
metadata:
  name: authentik-internal
  namespace: authentik
  annotations:
    # Apply after the authentik child app has created this namespace.
    argocd.argoproj.io/sync-wave: "10"
spec:
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: authentik
  ports:
    - name: http
      port: 32170
      targetPort: 9000
      protocol: TCP
