apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: khook
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/kagent-dev/khook/helm/khook
      chart: khook
      targetRevision: "0.0.4"
      helm:
        values: |
          image:
            registry: ghcr.io
            repository: kagent-dev/khook/khook
    - repoURL: https://github.com/Matcham89/AI-powered-SRE
      targetRevision: HEAD
      path: platform/hooks
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
