apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: "2024.12.3"
      helm:
        valueFiles:
          - $values/platform/auth/values.yaml
    - repoURL: https://github.com/Matcham89/AI-powered-SRE
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Matcham89/AI-powered-SRE
      targetRevision: HEAD
      path: platform/auth
      directory:
        # HTTPRoutes are applied by the authentik-routes app. The SopsSecret
        # (*.enc.yaml) must be included so the authentik-secrets native Secret
        # is materialised — otherwise postgres init-db and authentik-server
        # both hang in CreateContainerConfigError.
        exclude: "httproute-*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
