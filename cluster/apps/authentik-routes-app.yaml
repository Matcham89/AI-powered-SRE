apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-routes
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Sync after authentik Helm release is healthy
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/Matcham89/AI-powered-SRE
    targetRevision: HEAD
    path: platform/auth
    directory:
      include: "httproute-*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
