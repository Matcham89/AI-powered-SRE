apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: khook-crds
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/kagent-dev/khook/helm/khook-crds
      chart: khook-crds
      targetRevision: "0.0.4"
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
