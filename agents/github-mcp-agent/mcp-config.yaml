apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: github-mcp
  namespace: kagent
  labels:
    kagent.dev/discovery: "true"
spec:
  description: "GitHub MCP server — tools for repos, issues, and pull requests"
  headersFrom:
    - name: Authorization
      valueFrom:
        name: kagent-github
        key: GITHUB_PAT
        type: Secret
  protocol: STREAMABLE_HTTP
  sseReadTimeout: 5m0s
  terminateOnClose: true
  timeout: 5s
  url: https://api.githubcopilot.com/mcp/
