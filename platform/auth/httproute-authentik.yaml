# Envoy Gateway HTTPRoute — routes auth.local to Authentik server
# The Gateway (platform-gateway) must be healthy before this takes effect.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  parentRefs:
    - name: platform-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - auth.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: authentik-server
          port: 80
