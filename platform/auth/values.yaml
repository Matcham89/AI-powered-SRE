# Authentik Helm values
# Chart: authentik/authentik 2024.12.3
# Docs: https://docs.goauthentik.io/docs/installation/helm

global:
  envFrom:
    - secretRef:
        name: authentik-secrets

authentik:
  secret_key: ""

  error_reporting:
    enabled: false

  postgresql:
    host: "authentik-postgres-rw"
    port: 5432
    name: authentik
    user: authentik
    # Password injected via AUTHENTIK_POSTGRESQL__PASSWORD from envFrom above

  redis:
    host: "authentik-redis"
    port: 6379

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 5
    periodSeconds: 10

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

worker:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

# Sub-charts disabled — using CNPG cluster (platform/auth/postgresql.yaml)
# and standalone Redis (platform/auth/redis.yaml) instead
postgresql:
  enabled: false

redis:
  enabled: false
