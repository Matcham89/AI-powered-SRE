alloy:
  configMap:
    create: true
    content: |
      // ---- Logs: all pod logs → Loki ----
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "replace"
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action        = "replace"
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_container_name"]
          action        = "replace"
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action        = "replace"
          target_label  = "app"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

      // ---- Metrics: kube-state-metrics ----
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.observability.svc:8080",
        }]
        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "30s"
      }

      // ---- Metrics: kubelet cAdvisor (container CPU/memory) ----
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "cadvisor_targets" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          action      = "replace"
          target_label = "__address__"
          replacement  = "kubernetes.default.svc:443"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          action        = "replace"
          target_label  = "node"
        }
      }

      prometheus.scrape "cadvisor" {
        targets             = discovery.relabel.cadvisor_targets.output
        forward_to          = [prometheus.remote_write.mimir.receiver]
        scrape_interval     = "30s"
        scheme              = "https"
        bearer_token_file   = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
      }

      // ---- Remote Write → Mimir ----
      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc/api/v1/push"
        }
      }

      // ---- Traces: OTLP receiver → Tempo ----
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.exporter.otlphttp.tempo.input]
        }
      }

      otelcol.exporter.otlphttp "tempo" {
        client {
          endpoint = "http://tempo.observability.svc:4318"
        }
      }

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

controller:
  type: daemonset

service:
  enabled: true

serviceMonitor:
  enabled: false
