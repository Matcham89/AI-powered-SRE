alloy:
  configMap:
    create: true
    content: |
      // ---- Logs: all pod logs → Loki ----
      // Use filesystem-based tailing via /var/log/pods rather than
      // loki.source.kubernetes / discovery.kubernetes — the latter returns
      // 0 targets on Alloy v1.16 against k3s regardless of RBAC, and dropping
      // it unblocks the log pipeline without waiting on an upstream fix.
      local.file_match "pod_logs" {
        path_targets = [{"__path__" = "/var/log/pods/*/*/*.log"}]
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_labels.receiver]
      }

      // Path format is /var/log/pods/<namespace>_<pod>_<uid>/<container>/0.log
      // so regex out the three useful labels.
      loki.process "pod_labels" {
        forward_to = [loki.write.default.receiver]

        stage.regex {
          expression = "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>.+)_[^_/]+/(?P<container>[^/]+)/.*"
          source     = "filename"
        }
        stage.labels {
          values = {
            namespace = "",
            pod       = "",
            container = "",
          }
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

      // ---- Metrics: kube-state-metrics ----
      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.observability.svc:8080",
        }]
        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "60s"
      }

      // ---- Metrics: node-exporter (host CPU/memory/disk/network) ----
      prometheus.scrape "node_exporter" {
        targets = [{
          __address__ = "node-exporter-prometheus-node-exporter.observability.svc:9100",
        }]
        forward_to      = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "60s"
      }

      // ---- Metrics: kubelet cAdvisor (container CPU/memory) ----
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "cadvisor_targets" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          action      = "replace"
          target_label = "__address__"
          replacement  = "kubernetes.default.svc:443"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          action        = "replace"
          target_label  = "node"
        }
      }

      prometheus.scrape "cadvisor" {
        targets             = discovery.relabel.cadvisor_targets.output
        forward_to          = [prometheus.remote_write.mimir.receiver]
        scrape_interval     = "60s"
        scheme              = "https"
        bearer_token_file   = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = true
        }
      }

      // ---- Remote Write → Mimir ----
      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc/api/v1/push"
        }
      }

      // ---- Traces: OTLP receiver → Tempo ----
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.exporter.otlphttp.tempo.input]
        }
      }

      otelcol.exporter.otlphttp "tempo" {
        client {
          endpoint = "http://tempo.observability.svc:4318"
        }
      }

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  # /var/log is where kubelet drops pod logs — the filesystem-based
  # log collection above tails symlinks under /var/log/pods.
  mounts:
    varlog: true

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 150m
      memory: 512Mi

controller:
  type: daemonset

service:
  enabled: true

serviceMonitor:
  enabled: false
