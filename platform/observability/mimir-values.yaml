mimir:
  structuredConfig:
    ingest_storage:
      enabled: false
      kafka:
        address: "localhost:9092"
    ingester:
      push_grpc_method_enabled: true
      ring:
        replication_factor: 1
    limits:
      compactor_blocks_retention_period: 2h
      # 16-shard default overwhelms a single-node homelab ingester; 4 is plenty
      query_sharding_total_shards: 4
    common:
      storage:
        backend: s3
        s3:
          endpoint: seaweedfs-filer.seaweedfs.svc:8333
          bucket_name: mimir
          access_key_id: eb564277862c4709b2e1982ffac875e5
          secret_access_key: 07a8e88458f45e85d477011ad257f41e83ca95d1
          insecure: true
    blocks_storage:
      s3:
        bucket_name: mimir
    alertmanager_storage:
      s3:
        bucket_name: mimir
    ruler_storage:
      s3:
        bucket_name: mimir

minio:
  enabled: false

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 192Mi

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 150m
      memory: 384Mi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 192Mi

compactor:
  replicas: 1
  resources:
    requests:
      cpu: 20m
