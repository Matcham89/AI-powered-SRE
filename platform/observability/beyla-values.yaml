preset: application

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy.observability.svc:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  BEYLA_KUBE_METADATA_ENABLE: "autodetect"
  BEYLA_SAMPLE_RATIO: "0.2"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 1Gi

rbac:
  create: true

serviceAccount:
  create: true
