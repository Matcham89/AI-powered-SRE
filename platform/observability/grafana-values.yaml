admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  storageClassName: local-path
  size: 5Gi

grafana.ini:
  server:
    root_url: http://grafana.local:32170
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    client_id: grafana
    client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
    scopes: openid profile email groups
    auth_url: http://auth.local:32170/application/o/authorize/
    token_url: http://authentik-server.authentik.svc/application/o/token/
    api_url: http://authentik-server.authentik.svc/application/o/userinfo/
    role_attribute_path: "contains(groups, 'Grafana Admins') && 'Admin' || 'Viewer'"
  auth:
    oauth_auto_login: true
    signout_redirect_url: http://auth.local:32170/application/o/grafana/end-session/
  auth.basic:
    enabled: false

envValueFrom:
  GRAFANA_OIDC_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oidc-secret
      key: client_secret

sidecar:
  dashboards:
    enabled: true
    searchNamespace: observability

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    beyla-red-metrics:
      gnetId: 19419
      revision: 3
      datasource: Mimir
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki
    kubernetes-pods:
      gnetId: 15759
      revision: 29
      datasource: Mimir

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        url: http://tempo.observability.svc:3200
        access: proxy
        isDefault: false
      - name: Mimir
        type: prometheus
        url: http://mimir-nginx.observability.svc/prometheus
        access: proxy
        isDefault: true
