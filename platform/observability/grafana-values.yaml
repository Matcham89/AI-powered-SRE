admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  storageClassName: local-path
  size: 5Gi

grafana.ini:
  server:
    root_url: https://grafana.local
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    client_id: grafana
    client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
    scopes: openid profile email groups
    auth_url: https://auth.local/application/o/authorize/
    token_url: https://auth.local/application/o/token/
    api_url: https://auth.local/application/o/userinfo/
    role_attribute_path: "contains(groups, 'grafana-admins') && 'Admin' || 'Viewer'"
  auth:
    oauth_auto_login: false

envValueFrom:
  GRAFANA_OIDC_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oidc-secret
      key: client_secret

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        url: http://tempo.observability.svc:3200
        access: proxy
        isDefault: false
      - name: Mimir
        type: prometheus
        url: http://mimir-nginx.observability.svc/prometheus
        access: proxy
        isDefault: true
