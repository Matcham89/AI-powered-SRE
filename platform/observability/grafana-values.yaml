admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  storageClassName: local-path
  size: 5Gi

grafana.ini:
  server:
    root_url: http://grafana.demo:32170
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    client_id: grafana
    client_secret: ${GRAFANA_OIDC_CLIENT_SECRET}
    scopes: openid profile email groups
    auth_url: http://auth.demo:32170/application/o/authorize/
    token_url: http://authentik-server.authentik.svc/application/o/token/
    api_url: http://authentik-server.authentik.svc/application/o/userinfo/
    role_attribute_path: "contains(groups, 'Grafana Admins') && 'Admin' || 'Viewer'"
  auth:
    oauth_auto_login: true
    signout_redirect_url: http://auth.demo:32170/application/o/grafana/end-session/
  auth.basic:
    enabled: false

envValueFrom:
  GRAFANA_OIDC_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oidc-secret
      key: client_secret

sidecar:
  dashboards:
    enabled: false

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    beyla-red-metrics:
      gnetId: 19419
      revision: 3
      datasource: Mimir
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki
    kubernetes-pods:
      gnetId: 15759
      revision: 29
      datasource: Mimir
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Mimir
    slo-overview:
      json: |
        {
          "title": "SLO Overview — sample-api",
          "uid": "slo-overview",
          "tags": ["slo", "sample-api", "sre"],
          "schemaVersion": 36,
          "version": 1,
          "refresh": "1m",
          "time": {"from": "now-1h", "to": "now"},
          "panels": [
            {
              "type": "stat",
              "title": "Ready Pods",
              "description": "Number of sample-api pods currently in Ready state. SLO requires ≥ 1.",
              "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
              "id": 1,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [{"expr": "sum(kube_pod_status_ready{namespace=\"sample-api\", condition=\"true\"})", "refId": "A", "legendFormat": "Ready"}],
              "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none"},
              "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
            },
            {
              "type": "stat",
              "title": "SLO Target",
              "description": "Availability SLO target for sample-api.",
              "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
              "id": 2,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [{"expr": "vector(99)", "refId": "A"}],
              "options": {"colorMode": "value", "reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none"},
              "fieldConfig": {"defaults": {"unit": "percent", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}
            },
            {
              "type": "stat",
              "title": "Pod Restarts (last 5m)",
              "description": "Number of container restarts in sample-api in the last 5 minutes.",
              "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
              "id": 3,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"sample-api\"}[5m]))", "refId": "A"}],
              "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none"},
              "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}
            },
            {
              "type": "stat",
              "title": "SLI — Current Availability",
              "description": "1 = at least one pod ready (SLO met). 0 = no pods ready (SLO breaching).",
              "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
              "id": 4,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [{"expr": "min(kube_pod_status_ready{namespace=\"sample-api\", condition=\"true\"}) or vector(0)", "refId": "A"}],
              "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}, "graphMode": "none"},
              "fieldConfig": {"defaults": {"unit": "short", "mappings": [{"type": "value", "options": {"0": {"text": "BREACHING", "color": "red"}, "1": {"text": "OK", "color": "green"}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}
            },
            {
              "type": "timeseries",
              "title": "sample-api — Ready Pods over Time",
              "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
              "id": 5,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [
                {"expr": "sum(kube_pod_status_ready{namespace=\"sample-api\", condition=\"true\"})", "legendFormat": "Ready Pods", "refId": "A"},
                {"expr": "sum(kube_pod_container_status_restarts_total{namespace=\"sample-api\"})", "legendFormat": "Total Restarts (cumulative)", "refId": "B"}
              ],
              "fieldConfig": {"defaults": {"unit": "short", "min": 0}},
              "options": {"tooltip": {"mode": "multi"}}
            },
            {
              "type": "timeseries",
              "title": "sample-api — Restart Rate",
              "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
              "id": 6,
              "datasource": {"type": "prometheus", "uid": "mimir"},
              "targets": [
                {"expr": "sum by (pod, container) (increase(kube_pod_container_status_restarts_total{namespace=\"sample-api\"}[5m]))", "legendFormat": "{{pod}} / {{container}}", "refId": "A"}
              ],
              "fieldConfig": {"defaults": {"unit": "short", "min": 0}},
              "options": {"tooltip": {"mode": "multi"}}
            }
          ]
        }

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        url: http://loki.observability.svc:3100
        access: proxy
        isDefault: false
      - name: Tempo
        uid: tempo
        type: tempo
        url: http://tempo.observability.svc:3200
        access: proxy
        isDefault: false
      - name: Mimir
        uid: mimir
        type: prometheus
        url: http://mimir-gateway.observability.svc/prometheus
        access: proxy
        isDefault: true
        jsonData:
          manageAlerts: false
          prometheusType: Prometheus

alerting:
  rules.yaml:
    apiVersion: 1
    groups:
      # Fires whenever khook would fire — same signal (pod restart in sample-api namespace)
      - orgId: 1
        name: sre-agent
        folder: SRE Platform
        interval: 1m
        rules:
          - uid: khook-pod-restart-trigger
            title: "SRE Agent Triggered — Pod Crash Detected"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: mimir
                model:
                  datasource:
                    type: prometheus
                    uid: mimir
                  editorMode: code
                  expr: |
                    sum by (namespace, pod, container) (
                      increase(kube_pod_container_status_restarts_total{namespace="sample-api"}[5m])
                    )
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  refId: B
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 0s
            annotations:
              description: "A pod in the sample-api namespace has restarted. khook has detected this event and triggered the AI SRE agent (kagent) to perform root cause analysis. A GitHub Issue with the RCA report will be opened automatically."
              summary: "Pod crash detected — AI SRE agent triggered"
            labels:
              severity: warning
              source: khook

      # SLO: sample-api pod availability >= 99 %
      # SLI: fraction of 1-minute evaluation windows in which at least one
      #       sample-api pod is in the Ready condition.
      # Error budget: ~7.2 hours downtime per 30-day window.
      - orgId: 1
        name: slo
        folder: SRE Platform
        interval: 1m
        rules:
          - uid: sample-api-slo-availability
            title: "SLO Breach — sample-api availability below 99%"
            condition: B
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: mimir
                model:
                  datasource:
                    type: prometheus
                    uid: mimir
                  editorMode: code
                  expr: |
                    sum(kube_pod_status_ready{namespace="sample-api", condition="true"})
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: [1]
                        type: lt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  refId: B
                  type: threshold
            noDataState: Alerting
            execErrState: Alerting
            for: 2m
            annotations:
              description: >
                SLI: kube_pod_status_ready for the sample-api namespace.
                SLO target: 99% availability (at least one ready pod) over a
                30-day window (~7.2 hours error budget).
                The sample-api has had zero ready pods for more than 2 minutes,
                consuming error budget. khook will trigger the AI SRE agent if
                a crash loop underlies this outage.
              summary: "sample-api SLO breach — no ready pods for > 2 min"
            labels:
              severity: critical
              slo: sample-api-availability
              slo_target: "99"
