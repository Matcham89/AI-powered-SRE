apiVersion: batch/v1
kind: Job
metadata:
  name: seaweedfs-create-buckets
  namespace: seaweedfs
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: amazon/aws-cli:latest
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-creds
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-creds
                  key: secretKey
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              ENDPOINT=http://seaweedfs-s3.seaweedfs.svc:8333
              for bucket in loki tempo mimir temporal; do
                aws --endpoint-url "$ENDPOINT" s3 mb "s3://$bucket" 2>&1 || true
                echo "Bucket $bucket ensured"
              done
              echo "Done"
