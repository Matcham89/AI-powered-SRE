# Envoy Gateway Helm values
# Chart: oci://docker.io/envoyproxy/gateway-helm:v1.3.2
# Docs: https://gateway.envoyproxy.io/docs/

config:
  envoyGateway:
    # Log level for the gateway controller
    logging:
      level:
        default: info

    # Gateway API namespace watching — all namespaces
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller

deployment:
  replicas: 1            # 1 for homelab; increase to 2+ for HA
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
