apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgres
  namespace: temporal
  annotations:
    # Temporal's Helm chart registers the schema-init Job as a PreSync hook,
    # which needs postgres running. The Cluster itself also needs the
    # temporal-db-app Secret to initdb, so it must apply AFTER the SopsSecret
    # (wave -20) has had the SOPS Operator materialise the native Secrets.
    # Wave -10 is after the SopsSecret, before the schema Job at default 0.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-10"
spec:
  instances: 1
  postgresql:
    parameters:
      max_connections: "200"
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      secret:
        name: temporal-db-app
      postInitSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal;
        - ALTER USER temporal CREATEDB;
  superuserSecret:
    name: temporal-db-superuser
  storage:
    storageClass: local-path
    size: 1Gi
