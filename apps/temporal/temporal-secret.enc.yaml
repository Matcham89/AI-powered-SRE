apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
    name: temporal-secrets
    namespace: temporal
    annotations:
        # Must be in PreSync so the SOPS Operator has materialised the native
        # temporal-db-secret / temporal-db-app / temporal-db-superuser Secrets
        # before the Helm chart's PreSync schema-init Job mounts them.
        # Wave -10 runs after postgres (-20) but before the schema Job (default).
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: "-10"
