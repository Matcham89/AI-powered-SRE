apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
    name: temporal-secrets
    namespace: temporal
    annotations:
        # This must run FIRST in PreSync: the CNPG Cluster's initdb pod
        # mounts temporal-db-app, and the Helm chart's schema-init Job mounts
        # temporal-db-secret. Both fail with CreateContainerConfigError until
        # the SOPS Operator has produced the native Secrets. Wave -20 puts
        # this before the Cluster (-10) and the schema Job (default 0).
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: "-20"
