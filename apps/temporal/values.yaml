server:
  replicaCount: 1

  config:
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 128
      datastores:
        default:
          sql:
            pluginName: postgres12_pgx
            databaseName: temporal
            connectAddr: "temporal-postgres-rw.temporal.svc:5432"
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
            maxConns: 10
            maxIdleConns: 10
            maxConnLifetime: "1h"
        visibility:
          sql:
            pluginName: postgres12_pgx
            databaseName: temporal_visibility
            connectAddr: "temporal-postgres-rw.temporal.svc:5432"
            connectProtocol: tcp
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
            maxConns: 5
            maxIdleConns: 5
            maxConnLifetime: "1h"

web:
  replicaCount: 1
  # Temporal UI's CSRF protection writes the _csrf cookie with Secure flag by
  # default. Because the platform is served over plain HTTP on :32170 the
  # browser drops that cookie and every POST (Start Workflow, Terminate, etc.)
  # returns "missing csrf token in request header". Flipping this to insecure
  # lets the cookie ride over HTTP so writes work again.
  additionalEnv:
    - name: TEMPORAL_CSRF_COOKIE_INSECURE
      value: "true"

admintools:
  enabled: true
