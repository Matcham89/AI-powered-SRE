apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: temporal
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      # auth.local resolves via CoreDNS (cluster/argocd/coredns-custom.yaml
      # rewrites it to authentik-internal.authentik.svc.cluster.local:32170).
      # A hostAliases entry here would override that rewrite with an
      # environment-specific node IP that breaks on any other host.
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=http://auth.local:32170/application/o/temporal/
            - --insecure-oidc-allow-unverified-email=true
            - --insecure-oidc-skip-issuer-verification=true
            - --email-domain=*
            - --upstream=http://temporal-web.temporal.svc:8080
            - --http-address=0.0.0.0:4180
            - --redirect-url=http://temporal.local:32170/oauth2/callback
            - --skip-provider-button=true
            - --cookie-secure=false
            - --cookie-domain=temporal.local
            - --code-challenge-method=S256
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: temporal-oauth2-proxy
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: temporal-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: temporal-oauth2-proxy
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: temporal
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
