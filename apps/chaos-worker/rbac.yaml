apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-worker
  namespace: chaos-worker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-worker-pod-killer
  namespace: sample-api
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-worker-pod-killer
  namespace: sample-api
subjects:
  - kind: ServiceAccount
    name: chaos-worker
    namespace: chaos-worker
roleRef:
  kind: Role
  name: chaos-worker-pod-killer
  apiGroup: rbac.authorization.k8s.io
