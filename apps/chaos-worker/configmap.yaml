apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-worker-script
  namespace: chaos-worker
data:
  workflows.py: |
    import asyncio
    import logging
    from datetime import timedelta

    from temporalio import activity, workflow

    log = logging.getLogger(__name__)


    def _delete_sample_api_pod() -> str:
        from kubernetes import client as k8s_client, config as k8s_config
        k8s_config.load_incluster_config()
        v1 = k8s_client.CoreV1Api()
        pods = v1.list_namespaced_pod("sample-api", label_selector="app=sample-api")
        if not pods.items:
            return "No sample-api pods found"
        pod_name = pods.items[0].metadata.name
        v1.delete_namespaced_pod(pod_name, "sample-api")
        return f"Deleted pod {pod_name} — restart will trigger SRE agent"


    @activity.defn
    async def crash_sample_api() -> str:
        log.info("Activity: deleting sample-api pod")
        loop = asyncio.get_event_loop()
        result = await loop.run_in_executor(None, _delete_sample_api_pod)
        log.info("Activity result: %s", result)
        return result


    @workflow.defn
    class ChaosWorkflow:
        @workflow.run
        async def run(self) -> str:
            await asyncio.sleep(5)
            return await workflow.execute_activity(
                crash_sample_api,
                schedule_to_close_timeout=timedelta(seconds=60),
            )

  worker.py: |
    # Long-running worker that polls chaos-queue forever. The README's "Trigger
    # the chaos demo" flow expects users to start workflows themselves via the
    # CLI/UI, which only works if a worker is registered on the queue. The
    # earlier one-shot variant ran one workflow and exited, leaving the queue
    # without a poller — every subsequent CLI call returned "Not enough hosts
    # to serve the request".
    import asyncio
    import logging
    import sys
    sys.path.insert(0, "/app")

    from temporalio.client import Client
    from temporalio.worker import Worker
    from workflows import ChaosWorkflow, crash_sample_api

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger(__name__)

    TASK_QUEUE = "chaos-queue"
    TEMPORAL_HOST = "temporal-frontend.temporal.svc:7233"


    async def main():
        client = await Client.connect(TEMPORAL_HOST)
        log.info("Connected to Temporal at %s, polling task-queue %s", TEMPORAL_HOST, TASK_QUEUE)
        worker = Worker(
            client,
            task_queue=TASK_QUEUE,
            workflows=[ChaosWorkflow],
            activities=[crash_sample_api],
        )
        await worker.run()


    if __name__ == "__main__":
        asyncio.run(main())
