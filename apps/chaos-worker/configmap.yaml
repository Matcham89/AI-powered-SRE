apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-worker-script
  namespace: chaos-worker
data:
  worker.py: |
    import asyncio
    import logging
    from datetime import timedelta

    from temporalio import activity, workflow
    from temporalio.client import Client
    from temporalio.worker import Worker

    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger(__name__)

    TASK_QUEUE = "chaos-queue"
    TEMPORAL_HOST = "temporal-frontend.temporal.svc:7233"


    def _delete_sample_api_pod() -> str:
        from kubernetes import client as k8s, config
        config.load_incluster_config()
        v1 = k8s.CoreV1Api()
        pods = v1.list_namespaced_pod("sample-api", label_selector="app=sample-api")
        if not pods.items:
            return "No sample-api pods found"
        pod_name = pods.items[0].metadata.name
        v1.delete_namespaced_pod(pod_name, "sample-api")
        return f"Deleted pod {pod_name} — restart will trigger SRE agent"


    @activity.defn
    async def crash_sample_api() -> str:
        log.info("Activity: deleting sample-api pod to simulate crash")
        loop = asyncio.get_event_loop()
        result = await loop.run_in_executor(None, _delete_sample_api_pod)
        log.info("Activity result: %s", result)
        return result


    @workflow.defn
    class ChaosWorkflow:
        @workflow.run
        async def run(self) -> str:
            log.info("ChaosWorkflow: starting — will crash sample-api in 5s")
            await asyncio.sleep(5)
            result = await workflow.execute_activity(
                crash_sample_api,
                schedule_to_close_timeout=timedelta(seconds=60),
            )
            return result


    async def main():
        client = await Client.connect(TEMPORAL_HOST)
        log.info("Connected to Temporal at %s", TEMPORAL_HOST)

        async with Worker(
            client,
            task_queue=TASK_QUEUE,
            workflows=[ChaosWorkflow],
            activities=[crash_sample_api],
        ):
            handle = await client.start_workflow(
                ChaosWorkflow.run,
                id="chaos-demo-1",
                task_queue=TASK_QUEUE,
            )
            log.info("Started ChaosWorkflow — id: %s", handle.id)
            result = await handle.result()
            log.info("ChaosWorkflow complete: %s", result)

    asyncio.run(main())
