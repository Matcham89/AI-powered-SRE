apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-worker
  namespace: chaos-worker
  labels:
    app: chaos-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-worker
  template:
    metadata:
      labels:
        app: chaos-worker
    spec:
      serviceAccountName: chaos-worker
      initContainers:
        # The Temporal Helm chart only sets up the DB schema; the "default"
        # namespace is registered by a separate PostSync hook job. Block the
        # worker until that namespace exists, otherwise the SDK fails
        # validation with "Namespace default is not found" and CrashLoops.
        - name: wait-for-temporal-namespace
          image: temporalio/admin-tools:1.30.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              until temporal operator namespace describe \
                    --address temporal-frontend.temporal.svc:7233 \
                    -n default >/dev/null 2>&1; do
                echo "waiting for Temporal namespace 'default'..."
                sleep 3
              done
              echo "Temporal namespace 'default' is ready."
        - name: install-deps
          image: python:3.11-slim
          command:
            - pip
            - install
            - "--target=/deps"
            - temporalio==1.8.0
            - kubernetes==32.0.0
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: chaos-worker
          image: python:3.11-slim
          command:
            - python
            - /app/worker.py
          env:
            - name: PYTHONPATH
              value: /deps
          volumeMounts:
            - name: script
              mountPath: /app
            - name: deps
              mountPath: /deps
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: script
          configMap:
            name: chaos-worker-script
        - name: deps
          emptyDir: {}
