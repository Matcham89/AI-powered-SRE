# SOPS Secrets Operator Helm values
# Chart: https://github.com/isindir/sops-secrets-operator
# Installed by bootstrap/install.sh, then handed to ArgoCD in platform/secrets/

replicaCount: 1

image:
  repository: quay.io/isindir/sops-secrets-operator
  pullPolicy: IfNotPresent

# The operator reads the Age private key from this K8s Secret.
# The secret is created imperatively by bootstrap/install.sh — it is the
# only non-declarative step in the entire platform.
extraEnv:
  - name: SOPS_AGE_KEY_FILE
    value: /etc/sops-age/keys.txt

# secretsAsFiles is the correct chart value for mounting K8s Secrets as files.
# extraVolumes/extraVolumeMounts are not recognised by this chart version.
secretsAsFiles:
  - name: sops-age-key
    mountPath: /etc/sops-age
    secretName: sops-age

# Watch all namespaces for SopsSecret CRDs
watchNamespaces: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceAccount:
  create: true
  name: sops-secrets-operator
