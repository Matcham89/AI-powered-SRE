apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Default-deny baseline (applied to highest-risk namespaces)
  - default-deny.yaml

  # Allow rules — applied alongside default-deny policies
  - allow-rules/dns-allow.yaml
  - allow-rules/argocd-allow.yaml
  - allow-rules/agents-allow.yaml
  - allow-rules/observability-allow.yaml
